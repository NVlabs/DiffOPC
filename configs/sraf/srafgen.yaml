  VERBOSE: ${sraf.common.VERBOSE}

  TileSizeX: ${eval:'${sraf.common.TileSizeX} // ${sraf.high.DownScale}'} # 2048
  TileSizeY: ${eval:'${sraf.common.TileSizeY} // ${sraf.high.DownScale}'} # 2048
  OffsetX: ${eval:'${sraf.common.OffsetX} // ${sraf.high.DownScale}'} # 384
  OffsetY: ${eval:'${sraf.common.OffsetY} // ${sraf.high.DownScale}'} # 384
  ILTSizeX: ${eval:'${sraf.common.ILTSizeX} // ${sraf.high.DownScale}'} # 1280
