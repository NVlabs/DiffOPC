common:
  TargetDensity: 0.225
  SigmoidSteepness: 4.0
  EPELoss: False
  WeightEPE: 100
  WeightL2: 1.0
  WeightPVBL2: 0.5
  WeightPVBand: 0.0
  StepSize: 1
  VISUAL_DEBUG: 0
  VERBOSE: 0
  OPT: "adam" # 'adam' or 'sgd'
  # OPT: "sgd"
  TileSizeX: 2048
  TileSizeY: 2048
  OffsetX: 384
  OffsetY: 384
  ILTSizeX: 1280
  ILTSizeY: 1280
  SEG_LENGTH: 80
  SRAF_FORBIDDEN: 60
  SRAF_threshold_min: 0.2
  SRAF_contour_area: 400
  SRAF_min_contour_wh_rule: 40 # with or height of sraf less than this, will be ignore
  SRAF_initial_sraf_wh: 60
  max_sraf_grad_candidates: 2
  max_sraf_grad_value: 0.9

mini:
  # common parameters
  TargetDensity: ${sraf.common.TargetDensity}
  SigmoidSteepness: ${sraf.common.SigmoidSteepness}
  EPELoss: ${sraf.common.EPELoss}
  WeightEPE: ${sraf.common.WeightEPE}
  WeightL2: ${sraf.common.WeightL2}
  WeightPVBL2: ${sraf.common.WeightPVBL2}
  WeightPVBand: ${sraf.common.WeightPVBand}
  OPT: ${sraf.common.OPT}
  # Debug parameters
  VISUAL_DEBUG: ${sraf.common.VISUAL_DEBUG}
  VERBOSE: ${sraf.common.VERBOSE}
  TileSizeX: ${eval:'${sraf.common.TileSizeX} // ${sraf.mini.DownScale}'} # 256
  TileSizeY: ${eval:'${sraf.common.TileSizeY} // ${sraf.mini.DownScale}'} # 256
  OffsetX: ${eval:'${sraf.common.OffsetX} // ${sraf.mini.DownScale}'} # 48
  OffsetY: ${eval:'${sraf.common.OffsetY} // ${sraf.mini.DownScale}'} # 48
  ILTSizeX: ${eval:'${sraf.common.ILTSizeX} // ${sraf.mini.DownScale}'} # 160
  ILTSizeY: ${eval:'${sraf.common.ILTSizeY} // ${sraf.mini.DownScale}'} # 160

  max_sraf_grad_candidates: ${sraf.common.max_sraf_grad_candidates} #5
  max_sraf_grad_value: ${sraf.common.max_sraf_grad_value} # 0.9

  StepSize: 1
  DownScale: 8
  Iterations: 70
  SEG_LENGTH: 10 # 15
  SRAF_ITERATIONS: 70

  # SRAF parameters
  IsInsertSRAF: false
  SRAF_FORBIDDEN: 10
  SRAF_contour_area: 25
  SRAF_threshold_min: 0.2
  SRAF_initial_sraf_wh: 8
  SRAF_min_contour_wh_rule: 5

low:
  # common parameters
  TargetDensity: ${sraf.common.TargetDensity}
  SigmoidSteepness: ${sraf.common.SigmoidSteepness}
  EPELoss: ${sraf.common.EPELoss}
  WeightEPE: ${sraf.common.WeightEPE}
  WeightL2: ${sraf.common.WeightL2}
  WeightPVBL2: ${sraf.common.WeightPVBL2}
  WeightPVBand: ${sraf.common.WeightPVBand}
  OPT: ${sraf.common.OPT}
  # Debug parameters
  VISUAL_DEBUG: ${sraf.common.VISUAL_DEBUG}
  VERBOSE: ${sraf.common.VERBOSE}
  TileSizeX: ${eval:'${sraf.common.TileSizeX} // ${sraf.low.DownScale}'} # 512
  TileSizeY: ${eval:'${sraf.common.TileSizeY} // ${sraf.low.DownScale}'} # 512
  OffsetX: ${eval:'${sraf.common.OffsetX} // ${sraf.low.DownScale}'} # 96
  OffsetY: ${eval:'${sraf.common.OffsetY} // ${sraf.low.DownScale}'} # 96
  ILTSizeX: ${eval:'${sraf.common.ILTSizeX} // ${sraf.low.DownScale}'} # 320
  ILTSizeY: ${eval:'${sraf.common.ILTSizeY} // ${sraf.low.DownScale}'} # 320

  max_sraf_grad_candidates: ${sraf.common.max_sraf_grad_candidates} #5
  max_sraf_grad_value: ${sraf.common.max_sraf_grad_value} # 0.9

  StepSize: 1
  DownScale: 4
  SEG_LENGTH: 40 # 15
  Iterations: 70
  SRAF_ITERATIONS: 70

  # SRAF parameters
  IsInsertSRAF: false
  SRAF_FORBIDDEN: 20
  SRAF_contour_area: 100
  SRAF_threshold_min: 0.2
  SRAF_initial_sraf_wh: 10
  SRAF_min_contour_wh_rule: 10

