  # common parameters
  TargetDensity: ${sraf.common.TargetDensity}
  SigmoidSteepness: ${sraf.common.SigmoidSteepness}
  EPELoss: ${sraf.common.EPELoss}
  WeightEPE: ${sraf.common.WeightEPE}
  WeightL2: ${sraf.common.WeightL2}
  WeightPVBL2: ${sraf.common.WeightPVBL2}
  WeightPVBand: ${sraf.common.WeightPVBand}
  OPT: ${sraf.common.OPT}
  # Debug parameters
  VISUAL_DEBUG: ${sraf.common.VISUAL_DEBUG}
  VERBOSE: ${sraf.common.VERBOSE}
  TileSizeX: ${eval:'${sraf.common.TileSizeX} // ${sraf.mid.DownScale}'} # 1024
  TileSizeY: ${eval:'${sraf.common.TileSizeY} // ${sraf.mid.DownScale}'} # 1024
  OffsetX: ${eval:'${sraf.common.OffsetX} // ${sraf.mid.DownScale}'} # 192
  OffsetY: ${eval:'${sraf.common.OffsetY} // ${sraf.mid.DownScale}'} # 192
  ILTSizeX: ${eval:'${sraf.common.ILTSizeX} // ${sraf.mid.DownScale}'} # 640
  ILTSizeY: ${eval:'${sraf.common.ILTSizeY} // ${sraf.mid.DownScale}'} # 640

  max_sraf_grad_candidates: ${sraf.common.max_sraf_grad_candidates} #5
  max_sraf_grad_value: ${sraf.common.max_sraf_grad_value} # 0.9

  StepSize: 2
  DownScale: 2
  SEG_LENGTH: 80
  Iterations: 70
  SRAF_ITERATIONS: 70

  # SRAF parameters
