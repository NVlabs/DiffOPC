Iterations: 70
TargetDensity: 0.225
SigmoidSteepness: 4.0
EPELoss: False
WeightEPE: 100
WeightL2: 1.0
WeightPVBL2: 0.9
WeightPVBand: 0.0
OPT: "adam" # 'adam' or 'sgd'

StepSize: 4

TileSizeX: 2048
TileSizeY: 2048
OffsetX: 384
OffsetY: 384
ILTSizeX: 1280
ILTSizeY: 1280
SEG_LENGTH: 60
DownScale: 1

# Debug parameters
VISUAL_DEBUG: 0
VERBOSE: 0

Evaluation: 1
eval_shot: true
